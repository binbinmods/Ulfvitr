[config]
schemaVersion = "0.2.1"

[package]
namespace = "Binbin"
name = "Ulfvitr"
versionNumber = "1.3.2"
description = "New Hero Mod for Ulfvitr, the Wise Wolf, a Wet-Lighting-Regen based Shaman."
websiteUrl = "https://github.com/binbinmods/Ulfvitr"
containsNsfwContent = false

[package.dependencies]
meds-Obeliskial_Essentials = "1.5.1"
meds-Obeliskial_Content = "1.7.2"


[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./Ulfvitr"
target = ""


[publish]
repository = "https://thunderstore.io"
communities = [ "across-the-obelisk", ]
[publish.categories]
across-the-obelisk = [ "mods", ]

